<!doctype html>
<html lang="de">
  <body style="margin:0;background:#f6f7fb;color:#17214f;font-family:Arial,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f6f7fb;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border:1px solid #dfe4f5;border-radius:8px;padding:28px;">
            <tr>
              <td>
                <h1 style="margin:0 0 12px;font-size:24px;line-height:1.25;">Bei CoRe anmelden</h1>
                <p style="margin:0 0 20px;font-size:15px;line-height:1.6;color:#4e5b8c;">Dieser Link meldet dich in deinem bestehenden CoRe-Account an.</p>
                <p style="margin:0 0 24px;">
                  <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#4f5eb1;color:#ffffff;text-decoration:none;font-weight:700;border-radius:8px;padding:12px 18px;">Anmelden</a>
                </p>
                <p style="margin:0 0 8px;font-size:13px;line-height:1.5;color:#66709a;">Falls du den Link nicht angefordert hast, kannst du diese E-Mail ignorieren.</p>
                <p style="margin:0;font-size:12px;line-height:1.5;word-break:break-all;color:#66709a;">{{ .ConfirmationURL }}</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
