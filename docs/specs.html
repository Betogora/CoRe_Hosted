<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CoRe — Produktvertrag und Kernjourneys</title>
  <style>
    :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #172033; background: #f5f7fb; }
    * { box-sizing: border-box; }
    body { margin: 0; }
    header { padding: 2rem max(1.25rem, calc((100vw - 76rem) / 2)); color: white; background: #172033; }
    header p { margin: .45rem 0 0; color: #cbd5e1; }
    .layout { display: grid; grid-template-columns: 18rem minmax(0, 52rem); gap: 2rem; max-width: 76rem; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
    nav { position: sticky; top: 1rem; align-self: start; max-height: calc(100vh - 2rem); overflow: auto; padding: 1rem; background: white; border: 1px solid #dbe2ea; border-radius: .75rem; }
    nav strong { display: block; margin-bottom: .75rem; }
    nav a { display: block; padding: .28rem 0; color: #42536b; text-decoration: none; font-size: .9rem; }
    nav a[data-level="3"] { padding-left: .8rem; font-size: .84rem; }
    main { min-width: 0; padding: 2rem 2.4rem; background: white; border: 1px solid #dbe2ea; border-radius: .75rem; box-shadow: 0 .5rem 1.5rem rgb(15 23 42 / .06); }
    h1, h2, h3 { color: #101828; line-height: 1.25; scroll-margin-top: 1rem; }
    h1 { margin-top: 0; font-size: 2.1rem; }
    h2 { margin-top: 2.4rem; padding-top: .4rem; border-top: 1px solid #e7ebf0; }
    h3 { margin-top: 1.7rem; }
    p, li { line-height: 1.68; }
    a { color: #175cd3; }
    code { padding: .12rem .3rem; border-radius: .25rem; background: #eef2f6; }
    pre { overflow: auto; padding: 1rem; color: #e2e8f0; background: #111827; border-radius: .55rem; }
    pre code { padding: 0; background: transparent; }
    table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: .92rem; }
    th, td { padding: .65rem; text-align: left; vertical-align: top; border: 1px solid #dbe2ea; }
    th { background: #f1f5f9; }
    .error { padding: 1rem; color: #8a1c1c; background: #fff1f1; border: 1px solid #ffc9c9; border-radius: .5rem; }
    @media (max-width: 860px) { .layout { display: block; } nav { position: static; margin-bottom: 1rem; } main { padding: 1.3rem; } }
  </style>
</head>
<body>
  <header>
    <h1>CoRe — Produktvertrag und Kernjourneys</h1>
    <p>Generierte HTML-Ansicht der einzigen kanonischen Quelle <code>docs/specs.md</code>.</p>
  </header>
  <div class="layout">
    <nav id="toc"><strong>Inhalt</strong></nav>
    <main id="content" aria-live="polite">Spezifikation wird geladen …</main>
  </div>
  <script>
    const escapeHtml = (value) => value
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;");

    const slug = (value) => value
      .toLocaleLowerCase("de")
      .normalize("NFKD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-z0-9äöüß]+/g, "-")
      .replace(/^-|-$/g, "");

    const inline = (value) => escapeHtml(value)
      .replace(/`([^`]+)`/g, "<code>$1</code>")
      .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');

    function renderMarkdown(source) {
      const lines = source.replace(/\r/g, "").split("\n");
      const output = [];
      let paragraph = [];
      let listType = null;
      let code = null;
      let table = [];

      const flushParagraph = () => {
        if (paragraph.length) output.push(`<p>${inline(paragraph.join(" "))}</p>`);
        paragraph = [];
      };
      const flushList = () => {
        if (listType) output.push(`</${listType}>`);
        listType = null;
      };
      const flushTable = () => {
        if (!table.length) return;
        const rows = table.map((line) => line.split("|").slice(1, -1).map((cell) => cell.trim()));
        const header = rows.shift();
        rows.shift();
        output.push("<table><thead><tr>" + header.map((cell) => `<th>${inline(cell)}</th>`).join("") + "</tr></thead><tbody>");
        for (const row of rows) output.push("<tr>" + row.map((cell) => `<td>${inline(cell)}</td>`).join("") + "</tr>");
        output.push("</tbody></table>");
        table = [];
      };

      for (let index = 0; index < lines.length; index += 1) {
        const line = lines[index];
        if (code !== null) {
          if (line.startsWith("```")) { output.push(`<pre><code>${escapeHtml(code.join("\n"))}</code></pre>`); code = null; }
          else code.push(line);
          continue;
        }
        if (line.startsWith("```")) { flushParagraph(); flushList(); flushTable(); code = []; continue; }
        if (/^\|.*\|$/.test(line) && /^\|[ :|-]+\|$/.test(lines[index + 1] || "")) { flushParagraph(); flushList(); table = [line, lines[++index]]; continue; }
        if (table.length && /^\|.*\|$/.test(line)) { table.push(line); continue; }
        if (table.length) flushTable();
        const heading = /^(#{1,3})\s+(.+)$/.exec(line);
        if (heading) {
          flushParagraph(); flushList();
          const level = heading[1].length;
          const text = heading[2];
          output.push(`<h${level} id="${slug(text)}">${inline(text)}</h${level}>`);
          continue;
        }
        if (/^---+$/.test(line)) { flushParagraph(); flushList(); output.push("<hr>"); continue; }
        const unordered = /^-\s+(.+)$/.exec(line);
        const ordered = /^\d+\.\s+(.+)$/.exec(line);
        if (unordered || ordered) {
          flushParagraph();
          const nextType = unordered ? "ul" : "ol";
          if (listType !== nextType) { flushList(); output.push(`<${nextType}>`); listType = nextType; }
          output.push(`<li>${inline((unordered || ordered)[1])}</li>`);
          continue;
        }
        if (!line.trim()) { flushParagraph(); flushList(); continue; }
        paragraph.push(line.trim().replace(/  $/, ""));
      }
      flushParagraph(); flushList(); flushTable();
      return output.join("\n");
    }

    fetch("specs.md")
      .then((response) => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.text();
      })
      .then((source) => {
        const content = document.getElementById("content");
        content.innerHTML = renderMarkdown(source);
        const toc = document.getElementById("toc");
        for (const heading of content.querySelectorAll("h2, h3")) {
          const link = document.createElement("a");
          link.href = `#${heading.id}`;
          link.dataset.level = heading.tagName.slice(1);
          link.textContent = heading.textContent;
          toc.append(link);
        }
      })
      .catch(() => {
        document.getElementById("content").innerHTML = '<p class="error">Die Spiegelung konnte <code>specs.md</code> nicht laden. Öffne die HTML-Datei über den lokalen Entwicklungsserver oder lies <a href="specs.md">die kanonische Markdown-Quelle</a>.</p>';
      });
  </script>
</body>
</html>
