name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v7

      - name: Node.js einrichten
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Modultests ausführen
        run: npm test

      - name: Produktionsbuild erstellen
        run: npm run build

  browser-e2e:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v7

      - name: Node.js einrichten
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Chromium installieren
        run: npx playwright install --with-deps chromium

      - name: Supabase-Security-Gate und Browser-Smokes ausführen
        run: npm run test:e2e:local

      - name: Playwright-Fehlerartefakte hochladen
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-failure-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
