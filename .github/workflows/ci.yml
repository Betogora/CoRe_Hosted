name: CI

on:
  pull_request:
  push:
    branches:
      - main
  release:
    types:
      - published
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v7

      - name: Node.js einrichten
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: TypeScript-Verträge prüfen
        run: npm run typecheck

      - name: Unit- und Contract-Produktverträge prüfen
        run: npm run test:unit-contract

      - name: Produktionsbuild erstellen
        run: npm run build

  pr-product-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v7

      - name: Node.js einrichten
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Chromium installieren
        run: npx playwright install --with-deps chromium

      - name: Kern-RLS und fünf Golden-E2E-Produktverträge prüfen
        run: npm run test:pr:local

      - name: Playwright-Fehlerartefakte hochladen
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pr-product-gate-failure-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

  full-release-gate:
    if: github.event_name != 'pull_request'
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v7

      - name: Node.js einrichten
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Chromium installieren
        run: npx playwright install --with-deps chromium

      - name: Vollständiges Supabase-, Medien-, APKG- und Restore-Gate ausführen
        run: npm run test:release:local

      - name: Fehlerartefakte des Release-Gates hochladen
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: full-release-gate-failure-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
